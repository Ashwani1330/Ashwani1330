name: Metrics
on:
  # Reduced frequency from daily to every 6 hours to avoid API rate limits
  schedule: [{cron: "0 */6 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate metrics with retry logic
        id: metrics
        run: |
          set -e
          max_attempts=3
          attempt=1
          
          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt/$max_attempts..."
            
            # Generate metrics - will be created as github-metrics.svg
            if curl -s -o /dev/null -w "%{http_code}" "https://github.com"; then
              echo "Network check passed"
              break
            else
              echo "Network check failed, retrying in 10 seconds..."
              sleep 10
              attempt=$((attempt + 1))
            fi
          done
      
      - uses: lowlighter/metrics@latest
        id: generate-metrics
        continue-on-error: true
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Ashwani1330
          base: header, activity, repositories, metadata
          config_timezone: Asia/Kolkata
          repositories_skipped: Ashwani1330
          optimize: svg
          experimental_features: --optimize-svg
          plugin_languages: yes
          plugin_languages_ignored: html, css, shell, hlsl, shaderlab, mathematica
          plugin_languages_limit: 8
          plugin_lines: yes

      - name: Validate metrics SVG
        id: validate
        run: |
          set -e
          
          if [ ! -f "github-metrics.svg" ]; then
            echo "❌ ERROR: SVG file was not generated"
            exit 1
          fi
          
          SIZE=$(stat -c%s "github-metrics.svg")
          echo "📊 SVG file size: $SIZE bytes"
          
          # Check minimum file size (good SVGs are typically > 15KB)
          if [ $SIZE -lt 15000 ]; then
            echo "❌ ERROR: SVG file is too small ($SIZE bytes), data incomplete"
            exit 1
          fi
          
          # Validate critical content
          if ! grep -q "github-metrics" "github-metrics.svg"; then
            echo "❌ ERROR: SVG is corrupted or incomplete"
            exit 1
          fi
          
          # Check if languages data is present
          if grep -q "plugin_languages: yes" .github/workflows/metrics.yml; then
            if ! grep -q "Languages" "github-metrics.svg"; then
              echo "⚠️  WARNING: Languages section missing from SVG"
              exit 1
            fi
          fi
          
          echo "✅ SVG validation PASSED"

      - name: Commit updated metrics
        if: success()
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: github-metrics.svg
          commit_message: "Update github-metrics.svg [skip ci]"
          commit_options: --no-verify
          disable_globbing: false

      - name: Failed - Metrics not updated
        if: failure()
        run: |
          echo "⚠️  Metrics generation failed. Previous SVG preserved."
          echo "Last attempt to generate metrics encountered an error."
          echo "Check logs above for details."
          exit 0
